name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: npm init -y
      
      - run: npm install electron electron-builder --save-dev
      
      - run: |
          echo "{" > package.json
          echo "  \"name\": \"majestic\"," >> package.json
          echo "  \"version\": \"1.0.0\"," >> package.json
          echo "  \"main\": \"main.js\"," >> package.json
          echo "  \"build\": {" >> package.json
          echo "    \"win\": {" >> package.json
          echo "      \"target\": \"nsis\"" >> package.json
          echo "    }" >> package.json
          echo "  }" >> package.json
          echo "}" >> package.json
      
      - run: |
          echo "const { app, BrowserWindow } = require('electron');" > main.js
          echo "const path = require('path');" >> main.js
          echo "" >> main.js
          echo "function createWindow() {" >> main.js
          echo "  const win = new BrowserWindow({" >> main.js
          echo "    width: 1000," >> main.js
          echo "    height: 700," >> main.js
          echo "    webPreferences: {" >> main.js
          echo "      nodeIntegration: true" >> main.js
          echo "    }" >> main.js
          echo "  });" >> main.js
          echo "  win.loadFile('index.html');" >> main.js
          echo "}" >> main.js
          echo "" >> main.js
          echo "app.whenReady().then(createWindow);" >> main.js
      
      - run: |
          echo "<!DOCTYPE html>" > index.html
          echo "<html>" >> index.html
          echo "<head>" >> index.html
          echo "<meta charset='UTF-8'>" >> index.html
          echo "<style>" >> index.html
          echo "body {" >> index.html
          echo "  background: #0a0c12;" >> index.html
          echo "  color: #ffd966;" >> index.html
          echo "  text-align: center;" >> index.html
          echo "  padding: 50px;" >> index.html
          echo "  font-family: system-ui, 'Segoe UI', sans-serif;" >> index.html
          echo "}" >> index.html
          echo "h1 { font-size: 32px; }" >> index.html
          echo ".status { color: #4ade80; font-size: 24px; margin: 20px; }" >> index.html
          echo ".stats {" >> index.html
          echo "  background: #1a1d2a;" >> index.html
          echo "  padding: 20px;" >> index.html
          echo "  border-radius: 12px;" >> index.html
          echo "  margin: 20px auto;" >> index.html
          echo "  max-width: 400px;" >> index.html
          echo "}" >> index.html
          echo ".trigger { font-size: 48px; color: #ffd966; font-weight: bold; }" >> index.html
          echo "</style>" >> index.html
          echo "</head>" >> index.html
          echo "<body>" >> index.html
          echo "  <h1>Majestic Binder Admin</h1>" >> index.html
          echo "  <div class='status'>🟢 Активен</div>" >> index.html
          echo "  <div class='stats'>" >> index.html
          echo "    <div>📊 Всего триггеров: <span class='trigger'>1313</span></div>" >> index.html
          echo "    <div>📅 Репортов за день: 0</div>" >> index.html
          echo "    <div>📆 Репортов за неделю: 9</div>" >> index.html
          echo "    <div>🔧 Версия: 3.4.10</div>" >> index.html
          echo "  </div>" >> index.html
          echo "  <div>Разработал .w1sley</div>" >> index.html
          echo "  <div>дизайн от dipsy</div>" >> index.html
          echo "</body>" >> index.html
          echo "</html>" >> index.html
      
      - run: npx electron-builder --win
      
      - uses: actions/upload-artifact@v4
        with:
          name: Majestic-Binder-Admin
          path: dist/*.exe
