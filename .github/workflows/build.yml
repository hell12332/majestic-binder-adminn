name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
      {
        "name": "majestic-binder",
        "version": "1.0.0",
        "main": "main.js",
        "build": {
          "win": {
            "target": "nsis"
          }
        }
      }
      EOF
      
      - name: Create main.js
        run: |
          cat > main.js << 'EOF'
      const { app, BrowserWindow } = require('electron');
      
      function createWindow() {
        const win = new BrowserWindow({
          width: 1000,
          height: 700,
          webPreferences: {
            nodeIntegration: true
          }
        });
        win.loadFile('index.html');
      }
      
      app.whenReady().then(createWindow);
      EOF
      
      - name: Create index.html
        run: |
          cat > index.html << 'EOF'
      <!DOCTYPE html>
      <html>
      <head>
        <meta charset="UTF-8">
        <style>
          body {
            background: #0a0c12;
            color: #ffd966;
            text-align: center;
            padding: 50px;
            font-family: system-ui;
          }
          h1 { font-size: 32px; }
          .status { color: #4ade80; font-size: 24px; margin: 20px; }
          .stats {
            background: #1a1d2a;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 400px;
          }
          .trigger { font-size: 48px; color: #ffd966; font-weight: bold; }
        </style>
      </head>
      <body>
        <h1>Majestic Binder Admin</h1>
        <div class="status">🟢 Активен</div>
        <div class="stats">
          <div>📊 Всего триггеров: <span class="trigger">1313</span></div>
          <div>📅 Репортов за день: 0</div>
          <div>📆 Репортов за неделю: 9</div>
          <div>🔧 Версия: 3.4.10</div>
        </div>
        <div>Разработал .w1sley | дизайн от dipsy</div>
      </body>
      </html>
      EOF
      
      - name: Install dependencies
        run: |
          npm init -y
          npm install electron electron-builder --save-dev
          
      - name: Build
        run: npx electron-builder --win
        
      - uses: actions/upload-artifact@v4
        with:
          name: Majestic-Binder-Admin
          path: dist/*.exe
