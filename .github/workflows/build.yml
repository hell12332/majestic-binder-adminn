name: Build Majestic Binder Admin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create simple Electron app
        run: |
          mkdir app
          cd app
          npm init -y
          npm install electron
          echo 'const { app, BrowserWindow } = require("electron"); app.whenReady().then(() => { const win = new BrowserWindow({ width: 800, height: 600 }); win.loadURL("data:text/html,<h1>Majestic Binder Admin</h1><p>Working!</p>"); });' > main.js
          npx electron-builder --win --portable --publish never
      
      - uses: actions/upload-artifact@v4
        with:
          name: Majestic-Binder-Admin
          path: app/dist/*.exe
